<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Auth API Test Suite</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #cbd5e1;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }
    h1 {
      color: #f8fafc;
      border-bottom: 1px solid #334155;
      padding-bottom: 10px;
    }
    .test-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
    }
    .test-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
    }
    .test-name {
      color: #38bdf8;
    }
    .test-status {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.9em;
    }
    .status-success {
      background: #064e3b;
      color: #34d399;
    }
    .status-fail {
      background: #7f1d1d;
      color: #f87171;
    }
    pre {
      background: #0f172a;
      padding: 10px;
      border-radius: 4px;
      overflow-x: auto;
      border: 1px solid #1e293b;
      color: #e2e8f0;
      font-family: Consolas, Monaco, monospace;
      margin: 10px 0 0 0;
    }
    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 1em;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <h1>Auth API Test Dashboard</h1>
  <button id="run-btn" onclick="runTests()">Run Auth Tests</button>
  <div id="results" style="margin-top: 20px;"></div>

  <script>
    async function runTests() {
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = 'Running tests...';
      
      const tests = [];
      const email = `test_${Date.now()}@example.com`;
      const password = 'securepassword123';
      const name = 'Test User';
      let token = null;

      // Test 1: Register new user
      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        token = data.token;
        tests.push({
          num: 1,
          name: 'Register new user',
          expected: '201 with token',
          actualStatus: res.status,
          actualData: data,
          passed: res.status === 201 && !!data.token
        });
      } catch (err) {
        tests.push({ num: 1, name: 'Register new user', error: err.message, passed: false });
      }

      // Test 2: Register same email again
      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        tests.push({
          num: 2,
          name: 'Register same email again',
          expected: '400',
          actualStatus: res.status,
          actualData: data,
          passed: res.status === 400
        });
      } catch (err) {
        tests.push({ num: 2, name: 'Register same email again', error: err.message, passed: false });
      }

      // Test 3: Login with correct credentials
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        tests.push({
          num: 3,
          name: 'Login with correct credentials',
          expected: '200 with token',
          actualStatus: res.status,
          actualData: data,
          passed: res.status === 200 && !!data.token
        });
      } catch (err) {
        tests.push({ num: 3, name: 'Login with correct credentials', error: err.message, passed: false });
      }

      // Test 4: Login with wrong password
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: 'wrongpassword' })
        });
        const data = await res.json();
        tests.push({
          num: 4,
          name: 'Login with wrong password',
          expected: '401',
          actualStatus: res.status,
          actualData: data,
          passed: res.status === 401
        });
      } catch (err) {
        tests.push({ num: 4, name: 'Login with wrong password', error: err.message, passed: false });
      }

      // Test 5: GET /api/auth/me with token
      try {
        const res = await fetch('/api/auth/me', {
          method: 'GET',
          headers: {
            'Authorization': `Bearer ${token || ''}`
          }
        });
        const data = await res.json();
        tests.push({
          num: 5,
          name: 'GET /api/auth/me with token',
          expected: '200 with user data',
          actualStatus: res.status,
          actualData: data,
          passed: res.status === 200 && !!data.user
        });
      } catch (err) {
        tests.push({ num: 5, name: 'GET /api/auth/me with token', error: err.message, passed: false });
      }

      // Test 6: GET /api/auth/me without token
      try {
        const res = await fetch('/api/auth/me', {
          method: 'GET'
        });
        const data = await res.json();
        tests.push({
          num: 6,
          name: 'GET /api/auth/me without token',
          expected: '401',
          actualStatus: res.status,
          actualData: data,
          passed: res.status === 401
        });
      } catch (err) {
        tests.push({ num: 6, name: 'GET /api/auth/me without token', error: err.message, passed: false });
      }

      // Render results
      resultsDiv.innerHTML = '';
      tests.forEach(t => {
        const card = document.createElement('div');
        card.className = 'test-card';
        card.innerHTML = `
          <div class="test-header">
            <span class="test-name">Test ${t.num}: ${t.name}</span>
            <span class="test-status ${t.passed ? 'status-success' : 'status-fail'}">
              ${t.passed ? 'PASSED' : 'FAILED'}
            </span>
          </div>
          <p><strong>Expected:</strong> ${t.expected}</p>
          <p><strong>Actual Status:</strong> ${t.actualStatus || 'N/A'}</p>
          <pre>${JSON.stringify(t.actualData || t.error || {}, null, 2)}</pre>
        `;
        resultsDiv.appendChild(card);
      });
      
      // Store result in window object for easy reading by subagent
      window.testResults = tests;
    }
  </script>
</body>
</html>
